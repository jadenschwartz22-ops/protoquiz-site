<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found - EMS ProtoQuiz</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
  <meta name="theme-color" content="#06050a" />
  <style>
    :root{--bg:#06050a;--ink:#eae6dd;--muted:#8a857a;--amber:#ffb000;--mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;}
    *{box-sizing:border-box;margin:0;}
    body{background:var(--bg);color:var(--ink);font-family:var(--mono);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    main{max-width:560px;text-align:center;}
    .tag{color:var(--amber);font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:18px;}
    h1{font-size:clamp(28px,6vw,44px);letter-spacing:-.01em;margin-bottom:14px;text-transform:uppercase;}
    p{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:28px;}
    nav{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
    a{font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:13px 20px;text-decoration:none;transition:all .15s;}
    .primary{background:var(--amber);color:var(--bg);}
    .primary:hover{filter:brightness(1.08);}
    .ghost{border:1px solid var(--amber);color:var(--amber);}
    .ghost:hover{background:var(--amber);color:var(--bg);}
  </style>
</head>
<body>
  <main>
    <div class="tag">▸ 404 · Not in the protocol</div>
    <h1>Page not found.</h1>
    <p>This page doesn't exist — or it moved. The protocols you're looking for are back on the main page.</p>
    <nav>
      <a class="primary" href="/">← Home</a>
      <a class="ghost" href="/blog/">Blog</a>
      <a class="ghost" href="https://apps.apple.com/app/id6753611139" rel="noopener">App Store</a>
    </nav>
  </main>
</body>
</html>
