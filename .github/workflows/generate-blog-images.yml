name: Generate Blog Hero Images

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Regenerate all (overwrites existing). Default: only missing.'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate images
        env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            node scripts/gen-blog-images.mjs --force
          else
            node scripts/gen-blog-images.mjs
          fi

      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/images/posts/
          if git diff --staged --quiet; then
            echo "No new images to commit"
          else
            git commit -m "blog: add Gemini-generated hero images"
            git push
          fi
