name: IndexNow ping on deploy

on:
  push:
    branches: [main]
    paths:
      - "**.html"
      - "sitemap.xml"
      - "blog/feed.xml"
      - "llms.txt"
      - "robots.txt"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Wait for GitHub Pages to serve the new build
        run: sleep 90
      - name: Submit sitemap URLs to IndexNow
        run: node scripts/indexnow-ping.mjs
